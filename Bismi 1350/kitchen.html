<!DOCTYPE html>

<html lang="pt">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bismi Treats — Kitchen</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFFDF7;--card:#FFFFFF;--card2:#FAEDCD;
  --accent:#D4A373;--accent2:#CB997E;--accent-dark:#b5845a;
  --text:#3A3A3A;--text2:#7a6a58;--border:#e8d9c0;--border2:#d4c4a8;
  --success:#6a9e6a;--warning:#c9853a;--danger:#c0544a;--info:#5a85b0;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Georgia,sans-serif;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(212,163,115,0.15)}
.topbar-left{display:flex;align-items:center;gap:10px}
.role-badge{background:#6a9e6a20;color:#6a9e6a;padding:4px 12px;border-radius:20px;font-size:0.78rem;font-weight:700;border:1px solid #6a9e6a30}
.user-name{font-weight:700;color:var(--accent-dark);font-size:0.95rem}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-logout{background:white;border:1.5px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}
.last-update{font-size:0.72rem;color:var(--text2)}

/* FILTERS */
.filters{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-btn{background:white;border:1.5px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:0.8rem;font-family:inherit;transition:all .2s}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600}
.order-count-badge{background:var(--card2);border:1px solid var(--border);color:var(--accent-dark);padding:4px 12px;border-radius:20px;font-size:0.78rem;font-weight:700;margin-left:auto}

/* ORDERS GRID */
.orders-container{padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* KITCHEN CARD */
.kitchen-card{background:var(--card);border:2px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s;box-shadow:0 2px 12px rgba(212,163,115,0.08)}
.kitchen-card.priority{border-color:#c0544a;box-shadow:0 2px 16px rgba(192,84,74,0.2)}
.kitchen-card-header{padding:12px 14px;background:linear-gradient(135deg,var(--card2),#f5e4c0);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.order-id{font-weight:700;color:var(--accent-dark);font-size:0.88rem}
.priority-flag{background:#c0544a20;color:#c0544a;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:700;border:1px solid #c0544a30}
.status-badge{font-size:0.72rem;padding:3px 9px;border-radius:20px;font-weight:600}
.status-pending{background:#c9853a20;color:#c9853a}
.status-confirmed{background:#5a85b020;color:#5a85b0}
.status-ready{background:#6a9e6a20;color:#6a9e6a}
.status-delivered{background:#9a9a9a20;color:#9a9a9a}

.kitchen-card-body{padding:14px}
.info-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:0.85rem}
.info-row i{color:var(--accent);width:16px;flex-shrink:0;margin-top:2px}
.info-row .label{color:var(--text2);min-width:60px;font-size:0.78rem}
.info-row .value{color:var(--text);font-weight:600;flex:1}
.chef-note{background:linear-gradient(135deg,#D4A37318,#FAEDCD);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:8px 12px;margin-top:8px;font-size:0.82rem;color:var(--text2);font-style:italic}
.time-badge{display:inline-flex;align-items:center;gap:5px;background:#5a85b018;color:#5a85b0;padding:4px 10px;border-radius:8px;font-size:0.78rem;font-weight:600;border:1px solid #5a85b030}
.time-badge.urgent{background:#c0544a18;color:#c0544a;border-color:#c0544a30}

/* PHOTOS */
.photos-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.photos-title{font-size:0.72rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.photos-grid{display:flex;gap:8px;flex-wrap:wrap}
.photo-thumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border);cursor:pointer;transition:all .2s}
.photo-thumb:hover{border-color:var(--accent);transform:scale(1.05)}
.photo-label{font-size:0.65rem;color:var(--text2);text-align:center;margin-top:2px;max-width:64px}

/* UPLOAD READY PHOTO */
.upload-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.btn-upload{background:linear-gradient(135deg,#6a9e6a18,#6a9e6a10);border:1.5px dashed #6a9e6a60;color:#4a7e4a;padding:10px;border-radius:8px;cursor:pointer;font-size:0.82rem;width:100%;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-upload:hover{background:#6a9e6a20;border-color:#6a9e6a}

/* ACTION BUTTONS */
.kitchen-card-actions{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;background:#faf8f4}
.btn-action{border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:0.78rem;font-weight:600;display:flex;align-items:center;gap:5px;transition:all .2s;font-family:inherit}
.btn-confirm{background:#5a85b018;color:#5a85b0;border:1px solid #5a85b030}
.btn-confirm:hover{background:#5a85b0;color:white}
.btn-ready{background:#6a9e6a18;color:#6a9e6a;border:1px solid #6a9e6a30}
.btn-ready:hover{background:#6a9e6a;color:white}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2);grid-column:1/-1}
.empty-state i{font-size:3rem;margin-bottom:16px;opacity:.3;display:block;color:var(--accent)}

/* PHOTO MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-overlay.active{display:flex}
.photo-modal-img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain}
.modal-close-btn{position:fixed;top:16px;right:16px;background:white;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center}

/* TOAST */
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--card2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:600px){
  .orders-container{grid-template-columns:1fr;padding:10px}
  .kitchen-card-actions{justify-content:stretch}
  .btn-action{flex:1;justify-content:center}
}
</style>
</head>
<body>
<!-- TOPBAR -->
<div class="topbar">
<div class="topbar-left">
<span style="font-size:1.4rem">👨‍🍳</span>
<div>
<div class="user-name" id="userName">Kitchen</div>
<div class="role-badge">Kitchen Staff</div>
</div>
</div>
<div class="topbar-right">
<span class="last-update" id="lastUpdate">A atualizar...</span>
<button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</button>
</div>
</div>
<!-- FILTERS -->
<div class="filters">
<button class="filter-btn active" data-filter="active" onclick="setFilter('active',this)">Em Curso</button>
<button class="filter-btn" data-filter="pending" onclick="setFilter('pending',this)">⏳ Pendente</button>
<button class="filter-btn" data-filter="confirmed" onclick="setFilter('confirmed',this)">✅ Confirmado</button>
<button class="filter-btn" data-filter="ready" onclick="setFilter('ready',this)">🎂 Pronto</button>
<span class="order-count-badge" id="orderCountBadge">0 encomendas</span>
</div>
<!-- ORDERS -->
<div class="orders-container" id="ordersContainer">
<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>A carregar...</p></div>
</div>
<!-- PHOTO MODAL -->
<div class="modal-overlay" id="photoModal">
<button class="modal-close-btn" onclick="document.getElementById('photoModal').classList.remove('active')"><i class="fas fa-times"></i></button>
<img alt="Foto" class="photo-modal-img" id="photoModalImg" src=""/>
</div>
<input accept="image/*" id="readyPhotoInput" style="display:none" type="file"/>
<script src="auth.js"></script>
<script>
// ─── AUTH CHECK ──────────────────────────────────────────────
const session = AUTH.checkSession();
if (!session || session.role !== 'kitchen') {
  window.location.href = 'login.html';
}
document.getElementById('userName').textContent = session ? session.name : 'Kitchen';

let currentFilter = 'active';
let currentReadyOrderId = null;

// ─── FILTER ──────────────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderKitchenOrders();
}

// ─── RENDER ──────────────────────────────────────────────────
function renderKitchenOrders() {
  loadData();
  let list = orders.filter(o => {
    if (currentFilter === 'active') return o.status !== 'delivered';
    return o.status === currentFilter;
  });
  // Sort by delivery time (earliest first)
  list.sort((a, b) => {
    const da = (a.orderDate || '9999') + (a.orderTime || '99:99');
    const db = (b.orderDate || '9999') + (b.orderTime || '99:99');
    return da.localeCompare(db);
  });

  document.getElementById('orderCountBadge').textContent = list.length + ' encomenda' + (list.length !== 1 ? 's' : '');
  const container = document.getElementById('ordersContainer');

  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle" style="color:#6a9e6a;opacity:1"></i><p>Sem encomendas nesta categoria 🎉</p></div>';
    return;
  }

  container.innerHTML = list.map(order => buildKitchenCard(order)).join('');
  document.getElementById('lastUpdate').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit'});
}

function buildKitchenCard(order) {
  const flavorDesc = getFlavorDesc(order);
  const weightDesc = getWeightDesc(order);
  const dateStr = order.deliveryOption === 'express' ? '⚡ Expresso' : formatDate(order.orderDate);
  const timeStr = order.deliveryOption === 'express' ? (order.expressTime || '—') : formatTime(order.orderTime);
  const isPriority = order.priority;
  const isUrgent = order.orderDate === today() || order.deliveryOption === 'express';

  // Photos
  const photos = getOrderPhotos(order.id);
  let photosHtml = '';
  if (photos.length > 0) {
    photosHtml = `<div class="photos-section">
      <div class="photos-title"><i class="fas fa-images"></i> Fotos de Referência</div>
      <div class="photos-grid">
        ${photos.map(p => `<div><img class="photo-thumb" src="${p.data}" alt="${p.label}" onclick="viewPhoto('${p.data}')"/><div class="photo-label">${p.label}</div></div>`).join('')}
      </div>
    </div>`;
  }

  // Upload ready photo (only if confirmed)
  let uploadHtml = '';
  if (order.status === 'confirmed') {
    const readyPhotos = getOrderPhotos(order.id, 'ready');
    if (readyPhotos.length === 0) {
      uploadHtml = `<div class="upload-section">
        <button class="btn-upload" onclick="triggerReadyPhoto(${order.id})"><i class="fas fa-camera"></i> Adicionar Foto do Bolo Pronto</button>
      </div>`;
    } else {
      uploadHtml = `<div class="upload-section">
        <div class="photos-title"><i class="fas fa-check-circle" style="color:#6a9e6a"></i> Foto do Bolo Pronto</div>
        <div class="photos-grid">
          ${readyPhotos.map(p => `<div><img class="photo-thumb" src="${p.data}" alt="Pronto" onclick="viewPhoto('${p.data}')"/></div>`).join('')}
        </div>
      </div>`;
    }
  }

  // Action buttons
  let actionBtns = '';
  if (order.status === 'pending') {
    actionBtns = `<button class="btn-action btn-confirm" onclick="updateStatus(${order.id},'confirmed')"><i class="fas fa-check"></i> Confirmar</button>`;
  } else if (order.status === 'confirmed') {
    actionBtns = `<button class="btn-action btn-ready" onclick="markReady(${order.id})"><i class="fas fa-birthday-cake"></i> Marcar Pronto</button>`;
  }

  return `<div class="kitchen-card ${isPriority ? 'priority' : ''}" id="kcard-${order.id}">
    <div class="kitchen-card-header">
      <span class="order-id">${order.orderId || ''} — ${order.customerName}</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${isPriority ? '<span class="priority-flag">🔴 URGENTE</span>' : ''}
        <span class="status-badge status-${order.status}">${STATUS_LABELS[order.status] || order.status}</span>
      </div>
    </div>
    <div class="kitchen-card-body">
      <div class="info-row"><i class="fas fa-birthday-cake"></i><span class="label">Bolo</span><span class="value">${getCakeTypeName(order.cakeType)}</span></div>
      <div class="info-row"><i class="fas fa-palette"></i><span class="label">Sabor</span><span class="value">${flavorDesc}</span></div>
      ${order.cakeMessage ? `<div class="info-row"><i class="fas fa-comment"></i><span class="label">Mensagem</span><span class="value">"${order.cakeMessage}"</span></div>` : ''}
      <div class="info-row"><i class="fas fa-weight"></i><span class="label">Peso</span><span class="value">${weightDesc}</span></div>
      <div class="info-row">
        <i class="fas fa-clock"></i><span class="label">Entrega</span>
        <span class="value">
          <span class="time-badge ${isUrgent ? 'urgent' : ''}">${dateStr} ${timeStr !== '—' ? 'às ' + timeStr : ''}</span>
        </span>
      </div>
      <div class="info-row"><i class="fas fa-truck"></i><span class="label">Tipo</span><span class="value">${order.deliveryType === 'pickup' ? '🏪 Recolha' : '🚚 Entrega'}</span></div>
      ${order.chefNotes ? `<div class="chef-note"><i class="fas fa-utensils" style="margin-right:5px"></i>${order.chefNotes}</div>` : ''}
      ${photosHtml}
      ${uploadHtml}
    </div>
    ${actionBtns ? `<div class="kitchen-card-actions">${actionBtns}</div>` : ''}
  </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────
function updateStatus(orderId, newStatus) {
  const order = orders.find(o => o.id === orderId);
  if (!order) return;
  const oldStatus = order.status;
  order.status = newStatus;
  saveData();
  AUTH.logOrderActivity(orderId, order.orderId, 'status_change', `Estado alterado de ${oldStatus} para ${newStatus}`, session);
  renderKitchenOrders();
  showToast(`Estado atualizado: ${STATUS_LABELS[newStatus]}`);
}

function markReady(orderId) {
  const order = orders.find(o => o.id === orderId);
  if (!order) return;
  // Ask for final weight
  openKitchenWeightModal(orderId);
}

function openKitchenWeightModal(orderId){
  const order = orders.find(o => o.id === orderId);
  if(!order) return;
  // Build modal
  let modal = document.getElementById('kitchenWeightModal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'kitchenWeightModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(58,40,20,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px';
    modal.innerHTML = `<div style="background:white;border-radius:16px;width:100%;max-width:380px;overflow:hidden;box-shadow:0 20px 60px rgba(212,163,115,0.3)">
      <div style="background:linear-gradient(135deg,#FAEDCD,#f5e4c0);padding:16px 20px;border-bottom:1px solid #e8d9c0">
        <h3 style="font-size:1rem;font-weight:700;color:#b5845a;display:flex;align-items:center;gap:8px"><i class="fas fa-weight"></i> Peso Final do Bolo</h3>
      </div>
      <div style="padding:20px;display:flex;flex-direction:column;gap:14px">
        <p style="font-size:0.85rem;color:#7a6a58">Encomenda: <strong id="kwOrderRef"></strong></p>
        <div style="display:flex;flex-direction:column;gap:5px">
          <label style="font-size:0.76rem;color:#7a6a58;font-weight:600;text-transform:uppercase;letter-spacing:.03em">Peso Final (kg)</label>
          <select id="kwWeightSelect" style="background:#FAEDCD;border:1.5px solid #e8d9c0;color:#3A3A3A;padding:10px 12px;border-radius:8px;font-size:0.9rem;outline:none;font-family:inherit"></select>
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <label style="font-size:0.76rem;color:#7a6a58;font-weight:600;text-transform:uppercase;letter-spacing:.03em">Preço/kg (€)</label>
          <input type="number" id="kwPricePerKg" value="19.99" step="0.01" min="0" style="background:#FAEDCD;border:1.5px solid #e8d9c0;color:#3A3A3A;padding:10px 12px;border-radius:8px;font-size:0.9rem;outline:none;font-family:inherit"/>
        </div>
        <div style="background:linear-gradient(135deg,#6a9e6a18,#6a9e6a10);border:1.5px solid #6a9e6a40;border-radius:10px;padding:14px;text-align:center;font-size:1.4rem;font-weight:800;color:#6a9e6a;font-family:Georgia,serif" id="kwPriceDisplay">€0.00</div>
        <div style="font-size:0.75rem;color:#7a6a58;background:#FAEDCD;border-radius:8px;padding:8px 10px" id="kwExtrasInfo"></div>
      </div>
      <div style="padding:12px 20px;border-top:1px solid #e8d9c0;display:flex;gap:8px;justify-content:flex-end;background:#faf8f4;border-radius:0 0 14px 14px">
        <button onclick="document.getElementById('kitchenWeightModal').remove()" style="background:white;border:1.5px solid #e8d9c0;color:#3A3A3A;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.88rem;font-family:inherit">Cancelar</button>
        <button id="kwConfirmBtn" style="background:linear-gradient(135deg,#D4A373,#CB997E);color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.88rem;font-family:inherit"><i class="fas fa-check"></i> Confirmar</button>
      </div>
    </div>`;
    document.body.appendChild(modal);
  }
  document.getElementById('kwOrderRef').textContent = order.orderId || '';
  // Populate weight select
  const sel = document.getElementById('kwWeightSelect');
  sel.innerHTML = '';
  for(let w=0.5;w<=8.0;w=parseFloat((w+0.1).toFixed(1))){
    const opt=document.createElement('option'); opt.value=w.toFixed(1); opt.textContent=w.toFixed(1)+' kg';
    sel.appendChild(opt);
  }
  // Set default to order min weight
  const targetW = order.minWeight||order.customMinWeight||'1.0';
  for(let i=0;i<sel.options.length;i++){ if(parseFloat(sel.options[i].value)>=parseFloat(targetW)){ sel.selectedIndex=i; break; } }
  // Set price per kg
  const ppkg = getCakeTypePrice(order.cakeType);
  document.getElementById('kwPricePerKg').value = ppkg.toFixed(2);
  // Show extras info
  let extrasText = '';
  if(order.extraFilling) extrasText += `Recheio Extra: +€1.99 | `;
  if(order.extraProducts&&order.extraProducts.length>0) order.extraProducts.forEach(p=>{ extrasText+=`${p.name}: +€${parseFloat(p.price||0).toFixed(2)} | `; });
  document.getElementById('kwExtrasInfo').textContent = extrasText ? '➕ Extras incluídos: '+extrasText.slice(0,-3) : 'Sem extras adicionais';
  // Update price display
  function updateKwPrice(){
    const w=parseFloat(sel.value||0);
    const ppkg2=parseFloat(document.getElementById('kwPricePerKg').value||19.99);
    let extraFill=order.extraFilling?1.99:0;
    let extraProd=0; if(order.extraProducts) order.extraProducts.forEach(p=>extraProd+=parseFloat(p.price||0));
    const total=(w*ppkg2+extraFill+extraProd).toFixed(2);
    document.getElementById('kwPriceDisplay').textContent='€'+total;
    return total;
  }
  sel.addEventListener('change',updateKwPrice);
  document.getElementById('kwPricePerKg').addEventListener('input',updateKwPrice);
  updateKwPrice();
  // Confirm button
  document.getElementById('kwConfirmBtn').onclick = ()=>{
    const w=sel.value;
    const ppkg2=parseFloat(document.getElementById('kwPricePerKg').value||19.99);
    let extraFill=order.extraFilling?1.99:0;
    let extraProd=0; if(order.extraProducts) order.extraProducts.forEach(p=>extraProd+=parseFloat(p.price||0));
    const total=(parseFloat(w)*ppkg2+extraFill+extraProd).toFixed(2);
    order.finalWeight=w; order.finalPrice=total; order.finalPricePerKg=ppkg2;
    order.status='ready';
    saveData();
    AUTH.logOrderActivity(orderId, order.orderId, 'final_weight', `Peso: ${w}kg, Preço: €${total}`, session);
    // Check ready photo
    const readyPhotos = getOrderPhotos(orderId, 'ready');
    if(readyPhotos.length===0){
      if(!confirm('Sem foto do bolo pronto. Marcar como pronto mesmo assim?')){ modal.remove(); return; }
    }
    notifyCounter(order);
    modal.remove();
    renderKitchenOrders();
    showToast(`✅ Pronto! Peso: ${w}kg — €${total}`);
  };
}

function triggerReadyPhoto(orderId) {
  currentReadyOrderId = orderId;
  document.getElementById('readyPhotoInput').click();
}

document.getElementById('readyPhotoInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file || !currentReadyOrderId) return;
  const reader = new FileReader();
  reader.onload = ev => {
    saveOrderPhoto(currentReadyOrderId, { label: 'Bolo Pronto', data: ev.target.result, type: 'ready', uploadedBy: session.name, uploadedAt: new Date().toISOString() });
    AUTH.logOrderActivity(currentReadyOrderId, '', 'photo_upload', 'Foto do bolo pronto adicionada', session);
    renderKitchenOrders();
    showToast('Foto adicionada!');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function viewPhoto(src) {
  document.getElementById('photoModalImg').src = src;
  document.getElementById('photoModal').classList.add('active');
}

// ─── PHOTO STORAGE ───────────────────────────────────────────
function getOrderPhotos(orderId, type = null) {
  try {
    const photos = JSON.parse(localStorage.getItem('bismiPhotos_' + orderId) || '[]');
    return type ? photos.filter(p => p.type === type) : photos;
  } catch { return []; }
}
function saveOrderPhoto(orderId, photo) {
  try {
    const photos = getOrderPhotos(orderId);
    photos.push({ ...photo, id: Date.now() });
    localStorage.setItem('bismiPhotos_' + orderId, JSON.stringify(photos));
  } catch (e) {}
}

// ─── NOTIFY COUNTER ──────────────────────────────────────────
function notifyCounter(order) {
  try {
    const notifications = JSON.parse(localStorage.getItem('bismiCounterNotifications') || '[]');
    notifications.push({ type: 'ready', orderId: order.id, orderRef: order.orderId, customerName: order.customerName, timestamp: new Date().toISOString(), seen: false });
    localStorage.setItem('bismiCounterNotifications', JSON.stringify(notifications));
  } catch (e) {}
}

// ─── SHARE READY PHOTO VIA WHATSAPP ──────────────────────────
function shareReadyPhoto(orderId) {
  const order = orders.find(o => o.id === orderId);
  if (!order || !order.phone) { showToast('Número de telefone não disponível', 'error'); return; }
  const msg = `🎂 Olá ${order.customerName}!\n\nO seu bolo está pronto e a caminho! 😊\n\nObrigado por escolher a Bismi Treats! ❤️`;
  const phone = order.phone.replace(/\D/g, '');
  const fullPhone = phone.startsWith('351') ? phone : '351' + phone;
  window.open(`https://wa.me/${fullPhone}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ─── CALENDAR ACCESS ─────────────────────────────────────────
function openKitchenCalendar(){
  const calAccess = JSON.parse(localStorage.getItem('bismiCalendarAccess')||'{}');
  if(calAccess['kitchen']===false){ showToast('Acesso ao calendário não autorizado pelo admin','error'); return; }
  // Build simple calendar modal
  let modal = document.getElementById('kitchenCalModal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'kitchenCalModal';
    modal.style.cssText='position:fixed;inset:0;background:rgba(58,40,20,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;overflow-y:auto';
    document.body.appendChild(modal);
  }
  const now = new Date();
  const year = now.getFullYear(); const month = now.getMonth();
  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const daysInMonth = new Date(year,month+1,0).getDate();
  const firstDay = new Date(year,month,1).getDay();
  const orderMap = {};
  orders.forEach(o=>{ if(!o.orderDate) return; const d=new Date(o.orderDate+'T00:00:00'); if(d.getFullYear()===year&&d.getMonth()===month){ const day=d.getDate(); if(!orderMap[day]) orderMap[day]=[]; orderMap[day].push(o); } });
  let calHtml = `<div style="background:white;border-radius:16px;width:100%;max-width:500px;overflow:hidden;box-shadow:0 20px 60px rgba(212,163,115,0.3)">
    <div style="background:linear-gradient(135deg,#FAEDCD,#f5e4c0);padding:14px 18px;border-bottom:1px solid #e8d9c0;display:flex;align-items:center;justify-content:space-between">
      <h3 style="font-size:0.95rem;font-weight:700;color:#b5845a">📅 ${MONTHS[month]} ${year}</h3>
      <button onclick="document.getElementById('kitchenCalModal').remove()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#7a6a58">✕</button>
    </div>
    <div style="padding:14px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
        ${DAYS.map(d=>`<div style="text-align:center;font-size:0.68rem;font-weight:700;color:#7a6a58;padding:3px">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
        ${'<div></div>'.repeat(firstDay)}
        ${Array.from({length:daysInMonth},(_,i)=>i+1).map(d=>{
          const dayOrders=orderMap[d]||[];
          const count=dayOrders.length;
          let bg='#FAEDCD',color='#7a6a58',border='#e8d9c0';
          if(count>=6){bg='#c0544a20';color='#c0544a';border='#c0544a40';}
          else if(count>=3){bg='#c9853a20';color='#c9853a';border='#c9853a40';}
          else if(count>=1){bg='#D4A37320';color='#b5845a';border='#D4A373';}
          const isToday=now.getDate()===d;
          return `<div style="background:${bg};border:1.5px solid ${border};border-radius:6px;padding:4px 2px;text-align:center;${isToday?'outline:2px solid #b5845a;':''}">
            <div style="font-size:0.78rem;font-weight:700;color:${color}">${d}</div>
            ${count>0?`<div style="font-size:0.9rem;font-weight:800;color:${color}">${count}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:14px;border-top:1px solid #e8d9c0;padding-top:12px">
        <div style="font-size:0.8rem;font-weight:700;color:#b5845a;margin-bottom:8px">Encomendas de Hoje</div>
        ${(orderMap[now.getDate()]||[]).length===0?'<p style="font-size:0.82rem;color:#7a6a58">Sem encomendas hoje</p>':
          (orderMap[now.getDate()]||[]).map(o=>`<div style="background:#FAEDCD;border:1px solid #e8d9c0;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:0.8rem">
            <strong style="color:#b5845a">${o.orderId||''}</strong> — ${o.customerName}<br/>
            <span style="color:#7a6a58">${getCakeTypeName(o.cakeType)} | ⏰ ${o.orderTime||'—'}</span>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
  modal.innerHTML = calHtml;
}

// Add calendar button to topbar
document.addEventListener('DOMContentLoaded',()=>{
  const topbar = document.querySelector('.topbar-right');
  if(topbar){
    const calBtn = document.createElement('button');
    calBtn.className='btn-logout';
    calBtn.innerHTML='<i class="fas fa-calendar-alt"></i>';
    calBtn.title='Calendário';
    calBtn.addEventListener('click',openKitchenCalendar);
    topbar.insertBefore(calBtn,document.getElementById('logoutBtn'));
  }
});
