<!DOCTYPE html>

<html lang="pt">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bismi Treats — Delivery</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFFDF7;--card:#FFFFFF;--card2:#FAEDCD;
  --accent:#D4A373;--accent2:#CB997E;--accent-dark:#b5845a;
  --text:#3A3A3A;--text2:#7a6a58;--border:#e8d9c0;--border2:#d4c4a8;
  --success:#6a9e6a;--warning:#c9853a;--danger:#c0544a;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Georgia,sans-serif;min-height:100vh}

.topbar{background:var(--card);border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(212,163,115,0.15)}
.topbar-left{display:flex;align-items:center;gap:10px}
.role-badge{background:#c9853a20;color:#c9853a;padding:4px 12px;border-radius:20px;font-size:0.78rem;font-weight:700;border:1px solid #c9853a30}
.user-name{font-weight:700;color:var(--accent-dark);font-size:0.95rem}
.btn-logout{background:white;border:1.5px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}

.page-info{background:linear-gradient(135deg,var(--card2),#f5e4c0);padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.page-info-text{font-size:0.85rem;color:var(--text2)}
.page-info-text strong{color:var(--accent-dark)}
.order-count{background:var(--accent);color:white;padding:4px 14px;border-radius:20px;font-size:0.82rem;font-weight:700}

.orders-container{padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* DELIVERY CARD */
.delivery-card{background:var(--card);border:2px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(212,163,115,0.08);transition:all .2s}
.delivery-card.priority{border-color:#c0544a;box-shadow:0 2px 16px rgba(192,84,74,0.2)}
.delivery-card-header{padding:12px 14px;background:linear-gradient(135deg,var(--card2),#f5e4c0);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.order-id{font-weight:700;color:var(--accent-dark);font-size:0.9rem}
.priority-flag{background:#c0544a20;color:#c0544a;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:700}
.ready-badge{background:#6a9e6a20;color:#6a9e6a;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;border:1px solid #6a9e6a30}

.delivery-card-body{padding:14px}
.info-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;font-size:0.88rem}
.info-row i{color:var(--accent);width:18px;flex-shrink:0;margin-top:2px}
.info-label{color:var(--text2);min-width:65px;font-size:0.78rem}
.info-value{color:var(--text);font-weight:600;flex:1}

.delivery-type-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:0.82rem;font-weight:600}
.delivery-type-badge.pickup{background:#5a85b018;color:#5a85b0;border:1px solid #5a85b030}
.delivery-type-badge.delivery{background:#c9853a18;color:#c9853a;border:1px solid #c9853a30}

/* READY PHOTO */
.ready-photo-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.ready-photo-title{font-size:0.72rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.ready-photo-img{width:100%;max-height:160px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border);cursor:pointer}
.btn-share-photo{background:#25d36618;color:#1a9e4a;border:1px solid #25d36630;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:0.8rem;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:6px;margin-top:8px;width:100%;justify-content:center;transition:all .2s}
.btn-share-photo:hover{background:#25d366;color:white}

.delivery-card-actions{padding:12px 14px;border-top:1px solid var(--border);background:#faf8f4}
.btn-delivered{background:linear-gradient(135deg,#6a9e6a,#4a7e4a);color:white;border:none;padding:13px;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;width:100%;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-delivered:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(106,158,106,0.4)}
.btn-delivered:disabled{opacity:.5;cursor:not-allowed;transform:none}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2);grid-column:1/-1}
.empty-state i{font-size:3rem;margin-bottom:16px;opacity:.3;display:block;color:var(--accent)}

/* PAYMENT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(58,40,20,.55);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:16px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(212,163,115,0.3)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--card2),#f5e4c0);border-radius:14px 14px 0 0}
.modal-header h3{font-size:1rem;font-weight:700;color:var(--accent-dark)}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:#faf8f4;border-radius:0 0 14px 14px}
.payment-option{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:10px;transition:all .2s}
.payment-option:hover{border-color:var(--accent)}
.payment-option input[type=radio]{accent-color:var(--accent);width:18px;height:18px}
.payment-option label{cursor:pointer;font-size:0.9rem;font-weight:600;color:var(--text)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;padding:11px 22px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;font-family:inherit}
.btn-cancel{background:white;border:1.5px solid var(--border);color:var(--text);padding:11px 22px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;font-family:inherit}

/* PHOTO MODAL */
.photo-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:2000;padding:16px}
.photo-modal-overlay.active{display:flex}
.photo-modal-img{max-width:90vw;max-height:85vh;border-radius:12px}
.photo-close-btn{position:fixed;top:16px;right:16px;background:white;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center}

@media(max-width:600px){
  .orders-container{grid-template-columns:1fr;padding:10px}
}
</style>
</head>
<body>
<!-- TOPBAR -->
<div class="topbar">
<div class="topbar-left">
<span style="font-size:1.4rem">🚚</span>
<div>
<div class="user-name" id="userName">Delivery</div>
<div class="role-badge">Delivery Staff</div>
</div>
</div>
<button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</button>
</div>
<!-- PAGE INFO -->
<div class="page-info">
<div class="page-info-text">Mostrando apenas encomendas <strong>prontas para entrega</strong></div>
<span class="order-count" id="orderCount">0</span>
</div>
<!-- ORDERS -->
<div class="orders-container" id="ordersContainer">
<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>A carregar...</p></div>
</div>
<!-- PAYMENT CONFIRMATION MODAL -->
<div class="modal-overlay" id="paymentModal">
<div class="modal">
<div class="modal-header">
<h3>💳 Confirmar Entrega</h3>
</div>
<div class="modal-body">
<p style="font-size:0.88rem;color:var(--text2);margin-bottom:16px">Encomenda: <strong id="paymentOrderRef"></strong></p>
<p style="font-size:0.9rem;font-weight:600;color:var(--text);margin-bottom:14px">O pagamento foi recebido?</p>
<div class="payment-option">
<input id="payYes" name="paymentCollected" type="radio" value="yes"/>
<label for="payYes">✅ Sim, pagamento recebido</label>
</div>
<div class="payment-option">
<input id="payNo" name="paymentCollected" type="radio" value="no"/>
<label for="payNo">❌ Não, pagamento pendente</label>
</div>
<div id="paymentAmount" style="background:linear-gradient(135deg,#6a9e6a12,#6a9e6a08);border:1px solid #6a9e6a30;border-radius:8px;padding:12px;margin-top:10px;font-size:0.88rem;color:#4a7e4a;display:none"></div>
</div>
<div class="modal-footer">
<button class="btn-cancel" id="cancelPaymentBtn">Cancelar</button>
<button class="btn-primary" id="confirmDeliveryBtn"><i class="fas fa-check"></i> Confirmar Entrega</button>
</div>
</div>
</div>
<!-- PHOTO MODAL -->
<div class="photo-modal-overlay" id="photoModal">
<button class="photo-close-btn" onclick="document.getElementById('photoModal').classList.remove('active')"><i class="fas fa-times"></i></button>
<img alt="Foto" class="photo-modal-img" id="photoModalImg" src=""/>
</div>
<script src="auth.js"></script>
<script>
// ─── AUTH CHECK ──────────────────────────────────────────────
const session = AUTH.checkSession();
if (!session || session.role !== 'delivery') {
  window.location.href = 'login.html';
}
document.getElementById('userName').textContent = session ? session.name : 'Delivery';

let pendingDeliveryOrderId = null;

// ─── RENDER ──────────────────────────────────────────────────
function renderDeliveryOrders() {
  loadData();
  const list = orders.filter(o => o.status === 'ready').sort((a, b) => {
    const da = (a.orderDate || '9999') + (a.orderTime || '99:99');
    const db = (b.orderDate || '9999') + (b.orderTime || '99:99');
    return da.localeCompare(db);
  });

  document.getElementById('orderCount').textContent = list.length;
  const container = document.getElementById('ordersContainer');

  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-truck" style="opacity:.3"></i><p>Sem encomendas prontas para entrega</p><p style="font-size:0.8rem;margin-top:8px">As encomendas aparecerão aqui quando estiverem prontas</p></div>';
    return;
  }

  container.innerHTML = list.map(order => buildDeliveryCard(order)).join('');
}

function buildDeliveryCard(order) {
  const dateStr = order.deliveryOption === 'express' ? '⚡ Expresso' : formatDate(order.orderDate);
  const timeStr = order.deliveryOption === 'express' ? (order.expressTime || '—') : formatTime(order.orderTime);
  const isPriority = order.priority;
  const delivType = order.deliveryType === 'pickup' ? 'pickup' : 'delivery';
  const delivLabel = order.deliveryType === 'pickup' ? '🏪 Recolha' : '🚚 Entrega ao Domicílio';
  const priceDesc = getPriceDesc(order);

  // Ready photo
  let readyPhotoHtml = '';
  const readyPhotos = getOrderPhotos(order.id, 'ready');
  if (readyPhotos.length > 0) {
    readyPhotoHtml = `<div class="ready-photo-section">
      <div class="ready-photo-title"><i class="fas fa-camera"></i> Foto do Bolo</div>
      <img class="ready-photo-img" src="${readyPhotos[0].data}" alt="Bolo Pronto" onclick="viewPhoto('${readyPhotos[0].data}')"/>
      ${order.phone ? `<button class="btn-share-photo" onclick="shareReadyPhoto(${order.id})"><i class="fab fa-whatsapp"></i> Partilhar com Cliente</button>` : ''}
    </div>`;
  }

  return `<div class="delivery-card ${isPriority ? 'priority' : ''}" id="dcard-${order.id}">
    <div class="delivery-card-header">
      <span class="order-id">${order.orderId || ''} — ${order.customerName}</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${isPriority ? '<span class="priority-flag">🔴 URGENTE</span>' : ''}
        <span class="ready-badge">🎂 Pronto</span>
      </div>
    </div>
    <div class="delivery-card-body">
      <div class="info-row"><i class="fas fa-user"></i><span class="info-label">Cliente</span><span class="info-value">${order.customerName}</span></div>
      ${order.phone ? `<div class="info-row"><i class="fas fa-phone"></i><span class="info-label">Telefone</span><span class="info-value"><a href="tel:${order.phone}" style="color:var(--accent-dark)">${order.phone}</a></span></div>` : ''}
      <div class="info-row"><i class="fas fa-birthday-cake"></i><span class="info-label">Bolo</span><span class="info-value">${getCakeTypeName(order.cakeType)}</span></div>
      <div class="info-row"><i class="fas fa-clock"></i><span class="info-label">Hora</span><span class="info-value">${dateStr} ${timeStr !== '—' ? 'às ' + timeStr : ''}</span></div>
      <div class="info-row"><i class="fas fa-truck"></i><span class="info-label">Entrega</span><span class="info-value"><span class="delivery-type-badge ${delivType}">${delivLabel}</span></span></div>
      ${order.address ? `<div class="info-row"><i class="fas fa-map-marker-alt"></i><span class="info-label">Morada</span><span class="info-value">${order.address}</span></div>` : ''}
      <div class="info-row"><i class="fas fa-credit-card"></i><span class="info-label">Pagamento</span><span class="info-value">${order.paymentMethod || '—'} — ${priceDesc}</span></div>
      ${readyPhotoHtml}
    </div>
    <div class="delivery-card-actions">
      <button class="btn-delivered" onclick="openPaymentConfirm(${order.id})">
        <i class="fas fa-check-circle"></i> Marcar como Entregue
      </button>
    </div>
  </div>`;
}

// ─── PAYMENT CONFIRM ─────────────────────────────────────────
function openPaymentConfirm(orderId) {
  const order = orders.find(o => o.id === orderId);
  if (!order) return;
  pendingDeliveryOrderId = orderId;
  document.getElementById('paymentOrderRef').textContent = order.orderId || '';
  document.getElementById('payYes').checked = false;
  document.getElementById('payNo').checked = false;
  const priceDesc = getPriceDesc(order);
  const amountDiv = document.getElementById('paymentAmount');
  amountDiv.style.display = 'block';
  amountDiv.innerHTML = `💰 Valor a cobrar: <strong>${priceDesc}</strong> — ${order.paymentMethod || '—'}`;
  document.getElementById('paymentModal').classList.add('active');
}

document.getElementById('cancelPaymentBtn').addEventListener('click', () => {
  document.getElementById('paymentModal').classList.remove('active');
  pendingDeliveryOrderId = null;
});

document.getElementById('confirmDeliveryBtn').addEventListener('click', () => {
  if (!pendingDeliveryOrderId) return;
  const paymentCollected = document.querySelector('input[name="paymentCollected"]:checked')?.value;
  if (!paymentCollected) { alert('Por favor confirme se o pagamento foi recebido.'); return; }

  const order = orders.find(o => o.id === pendingDeliveryOrderId);
  if (!order) return;
  order.status = 'delivered';
  order.deliveredAt = new Date().toISOString();
  order.deliveredBy = session.name;
  order.paymentCollected = paymentCollected === 'yes';

  saveData();
  AUTH.logOrderActivity(pendingDeliveryOrderId, order.orderId, 'delivered', `Entregue por ${session.name}. Pagamento: ${paymentCollected === 'yes' ? 'Recebido' : 'Pendente'}`, session);

  // Notify counter
  notifyCounter(order, paymentCollected);

  document.getElementById('paymentModal').classList.remove('active');
  pendingDeliveryOrderId = null;
  renderDeliveryOrders();
  showToast('✅ Encomenda marcada como entregue!');
});

// ─── NOTIFY COUNTER ──────────────────────────────────────────
function notifyCounter(order, paymentCollected) {
  try {
    const notifications = JSON.parse(localStorage.getItem('bismiCounterNotifications') || '[]');
    notifications.push({
      type: 'delivered',
      orderId: order.id,
      orderRef: order.orderId,
      customerName: order.customerName,
      paymentCollected: paymentCollected === 'yes',
      deliveredBy: session.name,
      timestamp: new Date().toISOString(),
      seen: false
    });
    localStorage.setItem('bismiCounterNotifications', JSON.stringify(notifications));
  } catch (e) {}
}

// ─── PHOTO HELPERS ───────────────────────────────────────────
function getOrderPhotos(orderId, type = null) {
  try {
    const photos = JSON.parse(localStorage.getItem('bismiPhotos_' + orderId) || '[]');
    return type ? photos.filter(p => p.type === type) : photos;
  } catch { return []; }
}
function viewPhoto(src) {
  document.getElementById('photoModalImg').src = src;
  document.getElementById('photoModal').classList.add('active');
}
function shareReadyPhoto(orderId) {
  const order = orders.find(o => o.id === orderId);
  if (!order || !order.phone) { showToast('Número não disponível', 'error'); return; }
  const msg = `🎂 Olá ${order.customerName}!\n\nO seu bolo está pronto e a caminho! 😊\n\nObrigado por escolher a Bismi Treats! ❤️`;
  const phone = order.phone.replace(/\D/g, '');
  const fullPhone = phone.startsWith('351') ? phone : '351' + phone;
  window.open(`https://wa.me/${fullPhone}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ─── CALENDAR ACCESS ─────────────────────────────────────────
function openDeliveryCalendar(){
  const calAccess = JSON.parse(localStorage.getItem('bismiCalendarAccess')||'{}');
  if(calAccess['delivery']===false){ showToast('Acesso ao calendário não autorizado pelo admin','error'); return; }
  let modal = document.getElementById('deliveryCalModal');
  if(!modal){ modal=document.createElement('div'); modal.id='deliveryCalModal'; modal.style.cssText='position:fixed;inset:0;background:rgba(58,40,20,.55);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:16px;overflow-y:auto'; document.body.appendChild(modal); }
  const now=new Date(); const todayStr=now.toISOString().split('T')[0];
  const futureOrders=orders.filter(o=>o.orderDate&&o.orderDate>=todayStr&&o.status!=='delivered').sort((a,b)=>(a.orderDate+a.orderTime).localeCompare(b.orderDate+b.orderTime));
  const todayOrders=orders.filter(o=>o.orderDate===todayStr);
  const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  // Group future by date
  const grouped={};
  futureOrders.forEach(o=>{ if(!grouped[o.orderDate]) grouped[o.orderDate]=[]; grouped[o.orderDate].push(o); });
  let html=`<div style="background:white;border-radius:16px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 20px 60px rgba(212,163,115,0.3);margin-top:10px">
    <div style="background:linear-gradient(135deg,#FAEDCD,#f5e4c0);padding:14px 18px;border-bottom:1px solid #e8d9c0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0">
      <h3 style="font-size:0.95rem;font-weight:700;color:#b5845a">📅 Calendário de Entregas</h3>
      <button onclick="document.getElementById('deliveryCalModal').remove()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#7a6a58">✕</button>
    </div>
    <div style="padding:14px">
      <div style="background:#c9853a18;border:1px solid #c9853a30;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:0.82rem;color:#a06020">
        📅 Hoje: <strong>${todayOrders.length} encomenda${todayOrders.length!==1?'s':''}</strong> — ${todayOrders.filter(o=>o.deliveryType==='delivery').length} entregas, ${todayOrders.filter(o=>o.deliveryType==='pickup').length} recolhas
      </div>`;
  // Today's orders (show status, no delivered button)
  if(todayOrders.length>0){
    html+=`<div style="font-size:0.82rem;font-weight:700;color:#b5845a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Hoje</div>`;
    todayOrders.forEach(o=>{
      const statusColors={'pending':'#c9853a','confirmed':'#5a85b0','ready':'#6a9e6a','delivered':'#9a9a9a'};
      const statusLabels={'pending':'⏳ Pendente','confirmed':'✅ Confirmado','ready':'🎂 Pronto','delivered':'📦 Entregue'};
      html+=`<div style="background:#FAEDCD;border:1px solid #e8d9c0;border-radius:8px;padding:10px 12px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <strong style="color:#b5845a;font-size:0.85rem">${o.customerName}</strong>
          <span style="background:${statusColors[o.status]||'#999'}20;color:${statusColors[o.status]||'#999'};padding:2px 8px;border-radius:8px;font-size:0.72rem;font-weight:600">${statusLabels[o.status]||o.status}</span>
        </div>
        <div style="font-size:0.78rem;color:#7a6a58">⏰ ${o.orderTime||'—'} | ${o.deliveryType==='pickup'?'🏪 Recolha':'🚚 Entrega'}${o.address?' | 📍 '+o.address:''}</div>
      </div>`;
    });
    html+=`<div style="height:1px;background:#e8d9c0;margin:12px 0"></div>`;
  }
  // Future orders grouped by date
  html+=`<div style="font-size:0.82rem;font-weight:700;color:#b5845a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Próximas Entregas</div>`;
  const futureDates=Object.keys(grouped).filter(d=>d>todayStr).sort();
  if(futureDates.length===0){ html+=`<p style="font-size:0.82rem;color:#7a6a58">Sem entregas futuras agendadas</p>`; }
  futureDates.forEach(date=>{
    const d=new Date(date+'T00:00:00');
    const dateLabel=`${d.getDate()} de ${MONTHS[d.getMonth()]}`;
    html+=`<div style="background:#5a85b010;border:1px solid #5a85b030;border-radius:8px;padding:8px 12px;margin-bottom:6px">
      <div style="font-weight:700;font-size:0.82rem;color:#3a6590;margin-bottom:6px">📅 ${dateLabel} — ${grouped[date].length} encomenda${grouped[date].length!==1?'s':''}</div>
      ${grouped[date].map(o=>`<div style="font-size:0.78rem;color:#7a6a58;padding:3px 0;border-bottom:1px dotted #e8d9c0">
        <strong style="color:#3A3A3A">${o.customerName}</strong> | ⏰ ${o.orderTime||'—'} | ${o.deliveryType==='pickup'?'🏪':'🚚'} ${o.deliveryType==='pickup'?'Recolha':'Entrega'}
      </div>`).join('')}
    </div>`;
  });
  html+=`</div></div>`;
  modal.innerHTML=html;
}

// Add calendar button
document.addEventListener('DOMContentLoaded',()=>{
  const topbar=document.querySelector('.topbar');
  if(topbar){
    const calBtn=document.createElement('button');
    calBtn.className='btn-logout';
    calBtn.innerHTML='<i class="fas fa-calendar-alt"></i> Calendário';
    calBtn.style.marginRight='8px';
    calBtn.addEventListener('click',openDeliveryCalendar);
    document.getElementById('logoutBtn').parentNode.insertBefore(calBtn,document.getElementById('logoutBtn'));
  }
});

// ─── LOGOUT ──────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', () => {
  AUTH.logout();
  window.location.href = 'login.html';
});

// ─── INIT ────────────────────────────────────────────────────
renderDeliveryOrders();
setInterval(renderDeliveryOrders, 15000);
</script>
